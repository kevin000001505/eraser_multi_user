services:
  eraser:
    build:
      context: .
      dockerfile: Dockerfile
    image: eraser:local
    container_name: eraser
    restart: unless-stopped
    # Host port is configurable; the container always listens on 8080 internally.
    # Set ERASER_PORT in .env (e.g. 8081) to publish as 8081:8080.
    ports:
      - "${ERASER_PORT:-8080}:8080"
    environment:
      # Bind to all interfaces so the dashboard is reachable at <server-ip>:<port>.
      ERASER_HOST: "0.0.0.0"
      ERASER_TRUSTED_ORIGINS: "${IP}:${ERASER_PORT:-8080}"
      TZ: "${TZ:-UTC}"
    volumes:
      # Persists config.yaml, history.db and pending jobs across restarts.
      - eraser-data:/data

volumes:
  eraser-data:
